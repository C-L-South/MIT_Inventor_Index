<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoveNet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    video,
    canvas {
      display: none;
    }
    body {
      background: #fff;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #stage {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    video, canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      display: block;
      transform: scaleX(-1);
    }

    canvas {
      pointer-events: none;
    }
    #output {
    display:none;
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;

    color: lime;
    background: rgba(0, 0, 0, 0.65);
    padding: 10px;
    border-radius: 6px;

    font-size: 12px;
    max-width: 95vw;
    white-space: pre-wrap;
    word-break: break-word;
    }
    #similarityBox {
      position: absolute;
      bottom: 20px;
      left: 20px;

      width: calc(100vw - 40px);
      height: 45px;

      background: #222;
      border: 3px solid white;
      border-radius: 12px;
      overflow: hidden;
    }

    #similarityBar {
      position: absolute;
      left: 0;
      top: 0;

      height: 100%;
      width: 0%;

      background: red;

      transition: width 0.08s linear,
                  background 0.08s linear;
    }

.marker {
  position: absolute;
  top: 0;
  width: 2px;
  height: 100%;

  background: rgba(255,255,255,0.8);
  z-index: 5;
}

.marker33 {
  left: 33.33%;
}

.marker66 {
  left: 66.66%;
}

</style>
  <div id="stage">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <pre id="output"></pre>
    <div id="similarityBox">
      <div class="marker marker33"></div>
      <div class="marker marker66"></div>
      <div id="similarityBar"></div>
    </div>
    <p id="similarityText">similarity: 0.0000</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
  <script src="script.js"></script>
</body>
</html>
