<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Webcam + MoveNet Step 3</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      padding: 16px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      text-align: center;
    }

    #stage {
      position: relative;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }

    video,
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      display: block;
    }

    video {
      background: #000;
    }

    canvas {
      pointer-events: none;
    }

    #controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    #status {
      font-size: 16px;
      opacity: 0.95;
      text-align: center;
      max-width: 90vw;
      white-space: pre-wrap;
    }

    button {
      padding: 10px 16px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Webcam + MoveNet Test</h1>

  <div id="stage">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
  </div>

  <div id="controls">
    <button id="startBtn">Start Camera</button>
    <button id="detectBtn" disabled>Detect + Draw Once</button>
  </div>

  <div id="status">Step 3: run one detection and draw keypoints on the canvas.</div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

  <script>
    const stage = document.getElementById('stage');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    const detectBtn = document.getElementById('detectBtn');

    let detector = null;

    function resizeCanvasToVideo() {
      const width = video.videoWidth || 640;
      const height = video.videoHeight || 480;

      canvas.width = width;
      canvas.height = height;

      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
      video.style.width = width + 'px';
      video.style.height = height + 'px';
      stage.style.width = width + 'px';
      stage.style.height = height + 'px';
    }

    function drawKeypoints(keypoints) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'lime';

      let drawn = 0;

      for (const kp of keypoints) {
        if (kp.score > 0.3) {
          ctx.beginPath();
          ctx.arc(kp.x, kp.y, 5, 0, Math.PI * 2);
          ctx.fill();
          drawn++;
        }
      }

      return drawn;
    }

    async function startCamera() {
      statusEl.textContent = 'Requesting camera access...';

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: false
        });

        video.srcObject = stream;

        await new Promise((resolve) => {
          video.onloadedmetadata = resolve;
        });

        resizeCanvasToVideo();
        statusEl.textContent = 'Camera started. Loading MoveNet...';

        await tf.ready();
        const model = poseDetection.SupportedModels.MoveNet;
        detector = await poseDetection.createDetector(model, {
          modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING
        });

        detectBtn.disabled = false;
        statusEl.textContent = 'MoveNet loaded. Tap “Detect + Draw Once”.';
      } catch (error) {
        console.error(error);
        statusEl.textContent = 'Failed: ' + error.message;
      }
    }

    async function detectAndDrawOnce() {
      if (!detector) {
        statusEl.textContent = 'Detector is not loaded yet.';
        return;
      }

      try {
        statusEl.textContent = 'Running detection and drawing keypoints...';
        const poses = await detector.estimatePoses(video);
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (!poses.length) {
          statusEl.textContent = 'Detection worked, but no pose was found.';
          return;
        }

        const drawn = drawKeypoints(poses[0].keypoints || []);
        statusEl.textContent = 'Detection worked. Keypoints drawn: ' + drawn + '.';
      } catch (error) {
        console.error(error);
        statusEl.textContent = 'Detection failed: ' + error.message;
      }
    }

    startBtn.addEventListener('click', startCamera);
    detectBtn.addEventListener('click', detectAndDrawOnce);
  </script>
</body>
</html>
