<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Webcam + MoveNet Step 2</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      padding: 16px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      text-align: center;
    }

    #stage {
      position: relative;
      width: min(90vw, 720px);
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }

    video,
    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    video {
      object-fit: cover;
      background: #000;
    }

    canvas {
      pointer-events: none;
    }

    #controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    #status {
      font-size: 16px;
      opacity: 0.95;
      text-align: center;
      max-width: 90vw;
      white-space: pre-wrap;
    }

    button {
      padding: 10px 16px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Webcam + MoveNet Test</h1>

  <div id="stage">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
  </div>

  <div id="controls">
    <button id="startBtn">Start Camera</button>
    <button id="detectBtn" disabled>Run One Detection</button>
  </div>

  <div id="status">Step 2: load MoveNet, then run one pose detection on button press.</div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    const detectBtn = document.getElementById('detectBtn');

    let detector = null;

    function resizeCanvasToVideo() {
      const width = video.videoWidth || 640;
      const height = video.videoHeight || 480;
      canvas.width = width;
      canvas.height = height;
    }

    async function startCamera() {
      statusEl.textContent = 'Requesting camera access...';

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: false
        });

        video.srcObject = stream;

        await new Promise((resolve) => {
          video.onloadedmetadata = resolve;
        });

        resizeCanvasToVideo();
        statusEl.textContent = 'Camera started. Loading MoveNet...';

        await tf.ready();
        const model = poseDetection.SupportedModels.MoveNet;
        detector = await poseDetection.createDetector(model, {
          modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING
        });

        detectBtn.disabled = false;
        statusEl.textContent = 'MoveNet loaded. Tap “Run One Detection”.';
      } catch (error) {
        console.error(error);
        statusEl.textContent = 'Failed: ' + error.message;
      }
    }

    async function runOneDetection() {
      if (!detector) {
        statusEl.textContent = 'Detector is not loaded yet.';
        return;
      }

      try {
        statusEl.textContent = 'Running one pose detection...';
        const poses = await detector.estimatePoses(video);
        const count = poses.length;
        const keypointCount = count > 0 && poses[0].keypoints ? poses[0].keypoints.length : 0;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        statusEl.textContent = 'Detection worked. Poses found: ' + count + '. Keypoints in first pose: ' + keypointCount + '.';
      } catch (error) {
        console.error(error);
        statusEl.textContent = 'Detection failed: ' + error.message;
      }
    }

    startBtn.addEventListener('click', startCamera);
    detectBtn.addEventListener('click', runOneDetection);
  </script>
</body>
</html>
