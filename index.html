<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoveNet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #stage {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    video, canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      display: block;
      transform: scaleX(-1);
    }

    canvas {
      pointer-events: none;
    }
    #output {
    display:none;
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;

    color: lime;
    background: rgba(0, 0, 0, 0.65);
    padding: 10px;
    border-radius: 6px;

    font-size: 12px;
    max-width: 95vw;
    white-space: pre-wrap;
    word-break: break-word;
    }
    #similarityBox {
    position: absolute;
    bottom: 30px;
    right: 30px;
    z-index: 20;

    width: 50px;
    height: 350px;

    border: 3px solid white;
    background: #222;

    display: flex;
    align-items: flex-end;

    overflow: hidden;
    border-radius: 10px;
    }

    #similarityBar {
    width: 100%;
    height: 0%;

    background: lime;

    transition: height 0.08s linear;
    }

    #similarityText {
    position: absolute;
    bottom: 390px;
    right: 30px;
    z-index: 20;

    color: white;
    font-family: monospace;
    font-size: 18px;

    background: rgba(0,0,0,0.65);
    padding: 6px 10px;
    border-radius: 6px;
    }
    #repCount {
      position: absolute;
      top: 30px;
      right: 30px;
      z-index: 20;

      color: white;
      font-family: monospace;
      font-size: 72px;
      font-weight: bold;

      background: rgba(0,0,0,0.65);
      padding: 10px 20px;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  
  <div id="stage">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <pre id="output"></pre>
    <div id="similarityBox">
    <div id="similarityBar"></div>
    </div>
    <p id="similarityText">similarity: 0.0000</p>
    <div id="repCount">0</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
  <script src="script.js"></script>
</body>
</html>
